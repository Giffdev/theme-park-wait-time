<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="radarGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4F46E5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06B6D4;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Outer radar ring -->
  <circle cx="50" cy="50" r="45" fill="none" stroke="url(#radarGrad)" stroke-width="2" opacity="0.3"/>
  
  <!-- Middle radar ring -->
  <circle cx="50" cy="50" r="30" fill="none" stroke="url(#radarGrad)" stroke-width="2" opacity="0.5"/>
  
  <!-- Inner radar ring -->
  <circle cx="50" cy="50" r="15" fill="none" stroke="url(#radarGrad)" stroke-width="2" opacity="0.7"/>
  
  <!-- Radar sweep line -->
  <line x1="50" y1="50" x2="50" y2="5" stroke="url(#radarGrad)" stroke-width="3" opacity="0.8">
    <animateTransform
      attributeName="transform"
      attributeType="XML"
      type="rotate"
      from="0 50 50"
      to="360 50 50"
      dur="3s"
      repeatCount="indefinite"/>
  </line>
  
  <!-- Center dot -->
  <circle cx="50" cy="50" r="3" fill="url(#radarGrad)"/>
  
  <!-- Blip dots representing parks -->
  <circle cx="35" cy="25" r="2" fill="#10B981" opacity="0.9"/>
  <circle cx="65" cy="35" r="2" fill="#F59E0B" opacity="0.9"/>
  <circle cx="70" cy="65" r="2" fill="#EF4444" opacity="0.9"/>
  <circle cx="30" cy="70" r="2" fill="#8B5CF6" opacity="0.9"/>
</svg>